name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            PR_NUM=$(echo "$line" | grep -oE '#[0-9]+' | tail -1)
            TITLE=$(echo "$line" | sed 's/ (#[0-9]*)$//')
            ENTRY="* ${TITLE} ${PR_NUM}"

            if echo "$TITLE" | grep -qiE '^feat'; then
              FEATURES="${FEATURES}\n${ENTRY}"
            elif echo "$TITLE" | grep -qiE '^fix'; then
              FIXES="${FIXES}\n${ENTRY}"
            else
              OTHER="${OTHER}\n${ENTRY}"
            fi
          done < <(git log ${RANGE} --merges --oneline --format="%s" 2>/dev/null | grep '#' || \
                   git log ${RANGE} --oneline --format="%s" 2>/dev/null | grep '#')

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## 🚀 Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}## 🔧 Other Changes\n${OTHER}\n\n"
          fi

          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          fi

          {
            echo "body<<NOTES_EOF"
            echo -e "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Grove {0}', github.ref_name) || '' }}
          releaseBody: ${{ steps.notes.outputs.body || 'See the assets below to download the app.' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
